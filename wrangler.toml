name = "cp"
main = "src/worker.js"
compatibility_date = "2026-06-24"

assets = { directory = "./public", binding = "ASSETS", not_found_handling = "single-page-application" }

[[kv_namespaces]]
binding = "CP_KV"
id = "5a2435a6763d41898a9951e03b473831"

[vars]
APP_NAME = "클라우드프레스"
JWT_ISSUER = "cloudpress"
CLOUDFLARE_DRY_RUN = "true"
# 아래 값들은 `wrangler secret put` 으로 설정하세요:
# ADMIN_EMAIL        - 관리자 이메일
# JWT_SECRET         - JWT 서명 비밀키 (랜덤 64자 이상)
# CLOUDFLARE_ADMIN_EMAIL
# CLOUDFLARE_GLOBAL_API_KEY
# CLOUDFLARE_ACCOUNT_ID
# PAYPAL_CLIENT_ID
# PAYPAL_CLIENT_SECRET


[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
